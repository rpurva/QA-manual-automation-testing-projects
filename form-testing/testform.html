<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }
        .formcontainer {
            
            max-width: 650px;
            margin-left:30%;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            margin-top: 10px;
            display: block;
            font-weight: bold;
        }
        input, select, textarea {
            width: 95%;
            padding: 15px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #efae4d;
            color: rgb(11, 11, 11);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #f69a05;
        }
    </style>
</head>
<body>

<div class="formcontainer">
    <h2>Job Application Form</h2>
    <form action="#" method="post" enctype="multipart/form-data">
        
        <label for="name">Full Name :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address :</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number :</label>
        <input type="tel" id="phone" name="phone">

        <label for="role">Role Applying For :</label>
        <select id="role" name="position">
            <option value="">--Select--</option>
            <option value="developer"> Software Tester</option>
            <option value="developer"> Software Developer</option>
            <option value="designer">Web Designer</option>
            <option value="manager">Manager</option>
        </select>

        <label for="resume">Upload  :</label>
        <input type="file" id="resume" name="resume">

        <label for="message">Cover Letter / Message :</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <button type="submit">Submit Application</button>
    </form>
</div>

</body>
</html>
